<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>偽テトリス</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#000;
border:4px solid white;
}

#container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.side{
text-align:center;
}

h3{
margin:5px;
}
</style>
</head>

<body>

<h1>偽テトリス</h1>

<div>
Score: <span id="score">0</span> |
High Score: <span id="highscore">0</span>
</div>

<div id="container">

<div class="side">
<h3>HOLD</h3>
<canvas id="hold" width="80" height="80"></canvas>
</div>

<canvas id="game" width="240" height="400"></canvas>

<div class="side">
<h3>NEXT</h3>
<canvas id="next" width="80" height="80"></canvas>
</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const holdCanvas = document.getElementById("hold");
const holdCtx = holdCanvas.getContext("2d");

const nextCanvas = document.getElementById("next");
const nextCtx = nextCanvas.getContext("2d");

const COL = 12;
const ROW = 20;
const SIZE = 20;

let board = [];
let score = 0;

let highscore = localStorage.getItem("fakeTetrisHigh") || 0;
document.getElementById("highscore").textContent = highscore;

const pieces = [

{shape:[[1,1,1,1]],color:"cyan"},
{shape:[[1,1],[1,1]],color:"yellow"},
{shape:[[0,1,0],[1,1,1]],color:"purple"},
{shape:[[1,1,0],[0,1,1]],color:"green"},
{shape:[[0,1,1],[1,1,0]],color:"red"},
{shape:[[1,0,0],[1,1,1]],color:"blue"},
{shape:[[0,0,1],[1,1,1]],color:"orange"},

{shape:[[1,1,1],[1,0,1]],color:"pink"},
{shape:[[1,1,1],[0,1,0],[0,1,0]],color:"lime"},
{shape:[[1,1,1],[1,1,0]],color:"gold"}

];

function createBoard(){
for(let y=0;y<ROW;y++){
board[y]=[];
for(let x=0;x<COL;x++){
board[y][x]=0;
}
}
}

function randomPiece(){
return JSON.parse(JSON.stringify(
pieces[Math.floor(Math.random()*pieces.length)]
));
}

let piece = null;
let nextPiece = randomPiece();
let holdPiece = null;
let canHold = true;

function spawnPiece(){

piece = nextPiece;
piece.x = 4;
piece.y = 0;

nextPiece = randomPiece();

canHold = true;

if(collision(piece.x,piece.y,piece.shape)){
gameOver();
}

}

function drawCell(ctx,x,y,color,size){
ctx.fillStyle=color;
ctx.fillRect(x*size,y*size,size,size);
ctx.strokeStyle="#222";
ctx.strokeRect(x*size,y*size,size,size);
}

function collision(px,py,shape){

for(let y=0;y<shape.length;y++){
for(let x=0;x<shape[y].length;x++){

if(shape[y][x]){

let nx = px+x;
let ny = py+y;

if(nx<0 || nx>=COL || ny>=ROW) return true;

if(ny>=0 && board[ny][nx]) return true;

}

}
}

return false;

}

function getGhostY(){

let ghostY = piece.y;

while(!collision(piece.x,ghostY+1,piece.shape)){
ghostY++;
}

return ghostY;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<ROW;y++){
for(let x=0;x<COL;x++){
if(board[y][x]){
drawCell(ctx,x,y,board[y][x],SIZE);
}
}
}

let ghostY = getGhostY();

piece.shape.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
ctx.globalAlpha=0.25;
drawCell(ctx,piece.x+x,ghostY+y,piece.color,SIZE);
ctx.globalAlpha=1;
}
});
});

piece.shape.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
drawCell(ctx,piece.x+x,piece.y+y,piece.color,SIZE);
}
});
});

drawMini(nextCtx,nextPiece);
drawMini(holdCtx,holdPiece);

}

function drawMini(context,p){

context.clearRect(0,0,80,80);

if(!p) return;

const size=20;

p.shape.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
drawCell(context,x+1,y+1,p.color,size);
}
});
});

}

function merge(){

piece.shape.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
board[piece.y+y][piece.x+x]=piece.color;
}
});
});

}

function clearLines(){

for(let y=ROW-1;y>=0;y--){

if(board[y].every(v=>v!==0)){

board.splice(y,1);
board.unshift(new Array(COL).fill(0));

score+=100;
document.getElementById("score").textContent=score;

}

}

}

function rotate(){

const rotated = piece.shape[0].map((_,i)=>
piece.shape.map(row=>row[i]).reverse()
);

const old = piece.shape;
piece.shape = rotated;

if(collision(piece.x,piece.y,piece.shape)){
piece.shape = old;
}

}

function hold(){

if(!canHold) return;

if(!holdPiece){

holdPiece = piece;
spawnPiece();

}else{

let temp = holdPiece;
holdPiece = piece;

piece = temp;
piece.x=4;
piece.y=0;

}

canHold=false;

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){
piece.x--;
if(collision(piece.x,piece.y,piece.shape)) piece.x++;
}

else if(e.key==="ArrowRight"){
piece.x++;
if(collision(piece.x,piece.y,piece.shape)) piece.x--;
}

else if(e.key==="ArrowDown"){
piece.y++;
if(collision(piece.x,piece.y,piece.shape)){
piece.y--;
merge();
clearLines();
spawnPiece();
}
}

else if(e.key==="ArrowUp"){
rotate();
}

else if(e.key==="c" || e.key==="C"){
hold();
}

draw();

});

function drop(){

piece.y++;

if(collision(piece.x,piece.y,piece.shape)){

piece.y--;

merge();
clearLines();

spawnPiece();

}

draw();

}

function gameOver(){

if(score>highscore){
localStorage.setItem("fakeTetrisHigh",score);
}

alert("ゲームオーバー");

score=0;
document.getElementById("score").textContent=0;

createBoard();

spawnPiece();

}

createBoard();
spawnPiece();
draw();

setInterval(drop,500);

</script>

</body>
</html>
